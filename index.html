<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無審查AI_yeable</title>
    <style>
        /* 修改：限制最大寬度為 500px 並居中，適應手機並在電腦上顯得較窄 */
        body { 
            font-family: sans-serif; 
            background: #f4f7f6; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            height: 95vh; 
            margin: 0 auto; 
            max-width: 600px; 
        }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h2 { font-size: 1.2rem; margin: 0; }
        #chat { flex: 1; overflow-y: auto; background: white; border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; line-height: 1.5; max-width: 85%; word-wrap: break-word; font-size: 1rem; }
        .user { background: #007bff; color: white; align-self: flex-end; text-align: left; }
        .ai { background: #e9e9eb; color: #333; align-self: flex-start; }
        .input-group { display: flex; gap: 8px; }
        
        /* 修改：加大字體 (18px) 並增加內距，讓手指好點擊，並防止 iOS 自動放大 */
        input { 
            flex: 1; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            font-size: 18px; 
        }
        
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .model-info { font-size: 11px; color: #666; margin-bottom: 5px; }
        .clear-btn { background: #6c757d; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <h2>yeable_5060ti地端運算站</h2>
        <button class="clear-btn" onclick="clearChat()">清除記憶</button>
    </header>
    
    <div class="model-info">模型：maid (dolphin-2.9.3-mistral-nemo-12b.Q8；人格設定:女僕)</div>
    
    <div id="chat">
        <div class="msg ai">準備就緒！以下均由 yeable 自家顯卡計算，請開始對話。</div>
    </div>
    
    <div class="input-group">
        <input type="text" id="inp" placeholder="輸入訊息..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" id="btn">發送</button>
    </div>

<script>
        /**
         * ⚠ 重要設定：
         * 請將下方的 BASE_URL 替換為 tunnel_gate_rag.py 產生的 https 網址。
         * 注意：網址結尾不要加斜槓 (/)，例如：https://xyz.trycloudflare.com
         */
        const BASE_URL = "https://commonwealth-realize-backup-established.trycloudflare.com"; 

        async function send() {
            const inp = document.getElementById('inp');
            const btn = document.getElementById('btn');
            const text = inp.value.trim();
            
            if(!text) return;

            // 1. 顯示使用者訊息
            addMsg('user', text);
            inp.value = '';
            btn.disabled = true;

            // 2. 顯示等待狀態
            const aiDiv = addMsg('ai', '正在檢索本地文件並思考中...');

            try {
                // 3. 發送請求至本地 FastAPI (經由 Cloudflare 隧道)
                const res = await fetch(`${BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        "question": text 
                    })
                });

                if (!res.ok) {
                    throw new Error(`連線失敗 (Status: ${res.status})`);
                }

                const data = await res.json();
                
                // 4. 更新 AI 回應 (對應 FastAPI 回傳的 {"answer": "..."})
                if (data.answer) {
                    aiDiv.innerText = data.answer;
                } else {
                    aiDiv.innerText = "❌ 格式錯誤：伺服器未回傳 answer";
                }

            } catch (e) {
                console.error(e);
                aiDiv.innerText = "❌ 錯誤：" + e.message + "。請確認本地 tunnel_gate_rag.py 是否正在運行。";
                aiDiv.style.color = "red";
            } finally {
                btn.disabled = false;
                inp.focus();
            }
        }

        function addMsg(role, txt) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = txt;
            const chat = document.getElementById('chat');
            chat.appendChild(div);
            
            // 自動滾動到底部
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function clearChat() {
            if(confirm("確定要清除目前畫面上的對話嗎？")) {
                document.getElementById('chat').innerHTML = '<div class="msg ai">對話已清除。</div>';
            }
        }
    </script>
</body>
</html>
